<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>/r 遠隔指示</title>
  <link rel="manifest" href="manifest.json?v=20260506-191900">
  <link rel="stylesheet" href="style.css?v=20260506-191900">
  <meta name="theme-color" content="#1a73e8">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-left">
        <h1>📨 /r 遠隔指示</h1>
        <span id="conn-badge" class="badge">--</span>
      </div>
      <div class="header-right">
        <button id="btn-refresh" class="hbtn" title="再読込">🔄</button>
      </div>
    </header>

    <section class="composer">
      <textarea id="t-body" placeholder="ここに指示を書く（Markdown / 改行 OK）&#10;例: ◯◯のバグを直して" rows="3"></textarea>
      <div class="composer-foot">
        <input id="t-code" type="text" inputmode="numeric" pattern="\d{3,4}"
               maxlength="4" placeholder="番号(空欄=自動)" class="code-input">
        <button id="btn-add" class="primary">追加</button>
      </div>
      <div class="composer-hint">空欄なら 3 桁ランダム自動採番（直近 100 件で衝突回避）</div>
    </section>

    <nav class="tabs">
      <button class="tab active" data-tab="unconsumed">未取り込み</button>
      <button class="tab" data-tab="consumed">取り込み済み</button>
      <button class="tab" data-tab="archived">アーカイブ</button>
    </nav>

    <main id="list"></main>

    <footer>
      <span id="count-info">--</span>
      <span id="ver-info">v20260506-191900</span>
    </footer>
  </div>

  <!-- 編集モーダル -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-body">
      <div class="modal-head">
        <h2>編集 <span id="m-code" class="code-chip"></span></h2>
        <button id="m-close" class="icon-btn">✕</button>
      </div>
      <textarea id="m-body" rows="6"></textarea>
      <input id="m-reason" type="text" placeholder="編集理由（任意）" maxlength="200">
      <div class="m-versions">
        <details>
          <summary>過去の版（履歴）</summary>
          <div id="m-versions-list"></div>
        </details>
      </div>
      <div class="modal-foot">
        <button id="m-save" class="primary">保存</button>
        <button id="m-cancel" class="secondary">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="app.js?v=20260506-191900"></script>
</body>
</html>
